<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Thành Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .register-container { max-width: 600px; margin: 50px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0px 0px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="register-container">
        <h2 class="text-center mb-4 text-primary">ĐĂNG KÝ THÀNH VIÊN</h2>

        <form action="../controllers/RegisterController.php" method="POST" class="needs-validation" novalidate>
            
            <div class="mb-3">
                <label for="TaiKhoan" class="form-label">Tài khoản <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="TaiKhoan" name="TaiKhoan" required placeholder="Nhập tên đăng nhập">
            </div>

            <div class="mb-3">
                <label for="MatKhau" class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="MatKhau" name="MatKhau" required placeholder="Nhập mật khẩu">
            </div>

            <div class="mb-3">
                <label for="HoTen" class="form-label">Họ và Tên <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="HoTen" name="HoTen" required placeholder="Nhập họ tên đầy đủ">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="NgaySinh" class="form-label">Ngày sinh</label>
                    <input type="date" class="form-control" id="NgaySinh" name="NgaySinh">
                </div>
                
                <div class="col-md-6 mb-3">
                    <label class="form-label d-block">Giới tính</label>
                    <div class="form-check form-check-inline mt-2">
                        <input class="form-check-input" type="radio" name="GioiTinh" id="Nam" value="1" checked>
                        <label class="form-check-label" for="Nam">Nam</label>
                    </div>
                    <div class="form-check form-check-inline mt-2">
                        <input class="form-check-input" type="radio" name="GioiTinh" id="Nu" value="0">
                        <label class="form-check-label" for="Nu">Nữ</label>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="Email" class="form-label">Email</label>
                <input type="email" class="form-control" id="Email" name="Email" placeholder="name@example.com">
            </div>

            <div class="mb-3">
                <label for="SDT" class="form-label">Số điện thoại</label>
                <input type="tel" class="form-control" id="SDT" name="SDT" placeholder="Nhập số điện thoại">
            </div>

            <div class="mb-3">
                <label for="DiaChi" class="form-label">Địa chỉ</label>
                <input type="text" class="form-control" id="DiaChi" name="DiaChi" placeholder="Số nhà, tên đường, tỉnh/thành phố">
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary btn-block btn-lg">Đăng Ký</button>
            </div>
        </form>
    </div>
</div>

<script>
// Script validate form trống của Bootstrap 5
(function () {
  'use strict'
  var forms = document.querySelectorAll('.needs-validation')
  Array.prototype.slice.call(forms)
    .forEach(function (form) {
      form.addEventListener('submit', function (event) {
        if (!form.checkValidity()) {
          event.preventDefault()
          event.stopPropagation()
        }
        form.classList.add('was-validated')
      }, false)
    })
})()
</script>
</body>
</html>
