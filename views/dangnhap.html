<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Đăng Nhập Thành Viên</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Nhúng thư viện API JavaScript chính thức từ Google -->
	<script src="https://accounts.google.com/gsi/client" async defer></script>
	<style>
		body { background-color: #f8f9fa; }
		.login-container { max-width: 450px; margin: 80px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0px 0px 15px rgba(0,0,0,0.1); }
	</style>
</head>
<body>

<div class="container">
	<div class="login-container">
		<h2 class="text-center mb-4 text-primary fw-bold">ĐĂNG NHẬP</h2>

		<!-- Form Đăng Nhập Thông Thường -->
		<form action="../controllers/LoginController.php" method="POST" class="needs-validation" novalidate>
			<!-- Tài khoản Email -->
			<div class="mb-3">
				<label for="Email" class="form-label">Email <span class="text-danger">*</span></label>
				<input type="email" class="form-control" id="Email" name="Email" required placeholder="name@example.com">
			</div>

			<!-- Mật khẩu -->
			<div class="mb-3">
				<label for="MatKhau" class="form-label">Mật khẩu <span class="text-danger">*</span></label>
				<input type="password" class="form-control" id="MatKhau" name="MatKhau" required placeholder="Nhập mật khẩu">
			</div>

			<div class="d-grid gap-2 mt-4">
				<button type="submit" class="btn btn-primary btn-lg">Đăng Nhập</button>
			</div>
			
			<div class="text-center mt-3">
				<p class="small text-muted">Chưa có tài khoản? <a href="dangky_test.html" class="text-decoration-none">Đăng ký ngay</a></p>
			</div>
		</form>

		<!-- Đường Phân Cách Giữa Giao Diện Thường Và Google -->
		<div class="position-relative my-4 text-center">
			<hr>
			<span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted small">HOẶC</span>
		</div>

		<!-- NÚT ĐĂNG NHẬP GOOGLE IDENTITY SERVICES -->
		<!-- Lưu ý: Thay thế chuỗi 'YOUR_GOOGLE_CLIENT_ID' bằng Client ID thật của bạn -->
		<div id="g_id_onload"
			data-client_id="846674493938-j0osjm833d095939mk2t8i8fv2mebgm6.apps.googleusercontent.com"
			data-context="signin"
			data-ux_mode="redirect"
			data-login_uri="http://localhost/controllers/GoogleAuthController.php"
			data-auto_prompt="false">
		</div>

		<div class="g_id_signin d-flex justify-content-center"
			data-type="standard"
			data-shape="rectangular"
			data-theme="outline"
			data-text="signin_with"
			data-size="large"
			data-logo_alignment="left">
		</div>
	</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Kiểm tra tính hợp lệ dữ liệu bằng Bootstrap Validation
(function () {
	'use strict'
	var forms = document.querySelectorAll('.needs-validation')
	Array.prototype.slice.call(forms).forEach(function (form) {
		form.addEventListener('submit', function (event) {
			if (!form.checkValidity()) {
				event.preventDefault()
				event.stopPropagation()
			}
			form.classList.add('was-validated')
		}, false)
	})
})()
</script>
</body>
</html>
